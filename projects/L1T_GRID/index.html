<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L1T.GRID | Fallen Angel Stream</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#0a0a0a;color:#00ff41;padding:10px}
.nav{display:flex;gap:10px;margin-bottom:20px}
button{background:#1a1a1a;border:1px solid #00ff41;color:#00ff41;padding:10px 20px;cursor:pointer}
button:hover{background:#00ff41;color:#000}
.section{display:none}
.section.active{display:block}
input{width:100%;padding:15px;margin:10px 0;background:#151515;border:1px solid #333;color:#00ff41}
.card{background:#151515;border:1px solid #333;padding:15px;margin:10px 0}
#player{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1000}
video{width:90%;max-height:80vh;border:2px solid #00ff41}
.close{position:absolute;top:20px;right:20px;font-size:30px;color:#ff0040;cursor:pointer}
</style>
</head>
<body>
<div class="nav">
<button onclick="show('home')">🏠 HOME</button>
<button onclick="show('rd')">⚡ STREAM</button>
</div>
<div id="home" class="section active" style="text-align:center;padding-top:100px">
<h1 style="font-size:3rem;text-shadow:0 0 20px #00ff41">L1T.GRID</h1>
<p style="margin-top:20px;color:#666">Fallen Angel Stream Protocol</p>
<button onclick="show('rd')" style="margin-top:30px;padding:20px">⚡ ENTER STREAM CENTER</button>
</div>
<div id="rd" class="section">
<h2>⚡ REAL-DEBRID STREAMER</h2>
<input type="text" id="magnet" placeholder="Paste magnet link here...">
<button onclick="addMagnet()">➕ ADD TORRENT</button>
<button onclick="loadTorrents()">🔄 REFRESH LIST</button>
<div id="list"></div>
</div>
<div id="player">
<div class="close" onclick="closePlayer()">✕</div>
<h3 id="title" style="margin-bottom:20px"></h3>
<video id="video" controls></video>
</div>
<script>
function show(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
async function addMagnet(){const link=document.getElementById('magnet').value;if(!link)return alert('Paste magnet first');try{const r=await fetch('http://localhost:8081/torrents/addMagnet',{method:'POST',body:new URLSearchParams({magnet:link})});const d=await r.json();if(d.id){alert('Added! ID: '+d.id);document.getElementById('magnet').value='';loadTorrents()}else{alert('Error adding torrent: '+(d.error||'Unknown error'))}}catch(e){alert('Error: '+e)}}
async function loadTorrents(){try{const r=await fetch('http://localhost:8081/torrents?limit=50');const data=await r.json();document.getElementById('list').innerHTML=data.length?data.map(i=>`<div class="card"><strong>${i.filename}</strong><br><small>Status: ${i.status} | ${(i.bytes/1024/1024/1024).toFixed(2)}GB</small><br>${i.status==='downloaded'?`<button onclick="play('${i.id}')">▶ PLAY</button>`:'⏳ '+i.status}</div>`).join(''):'<p>No torrents found</p>'}catch(e){alert('Load error: '+e)}}
async function play(id){try{const r=await fetch('http://localhost:8081/torrents/info/'+id);const info=await r.json();if(!info.links?.length)return alert('No files ready');const u=await fetch('http://localhost:8081/unrestrict/link',{method:'POST',body:new URLSearchParams({link:info.links[0]})});const d=await u.json();document.getElementById('video').src=d.download;document.getElementById('title').textContent=info.filename;document.getElementById('player').style.display='flex';document.getElementById('video').play()}catch(e){alert('Play error: '+e)}}
function closePlayer(){document.getElementById('player').style.display='none';document.getElementById('video').pause();document.getElementById('video').src=''}
loadTorrents();
</script>
</body>
</html>
