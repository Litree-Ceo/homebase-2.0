<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlord AI Chat</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --dark-bg: #0a0a0f;
            --panel-bg: rgba(20, 20, 30, 0.9);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark-bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
        }
        
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .chat-container {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.2), rgba(0, 243, 255, 0.1));
            border: 1px solid var(--neon-blue);
        }
        
        .message.ai {
            align-self: flex-start;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .message.error {
            align-self: center;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff4444;
            color: #ff8888;
        }
        
        .input-container {
            padding: 20px;
            border-top: 1px solid rgba(0, 243, 255, 0.3);
            display: flex;
            gap: 10px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        
        #messageInput {
            flex: 1;
            padding: 12px 16px;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        
        #messageInput:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }
        
        #sendBtn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        #sendBtn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }
        
        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }
        
        .typing span {
            width: 8px;
            height: 8px;
            background: var(--neon-blue);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-link:hover {
            text-shadow: 0 0 10px var(--neon-blue);
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">← Back to Dashboard</a>
    
    <div class="header">
        <h1>🤖 Overlord AI Assistant</h1>
        <p style="color: #888; margin-top: 5px;">Powered by Groq (Llama 3)</p>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <div class="message ai">
            Hello! I'm your Overlord AI assistant. How can I help you today?
        </div>
    </div>
    
    <div class="input-container">
        <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
        <button id="sendBtn">Send</button>
    </div>

    <script>
        const API_KEY = localStorage.getItem('overlord_api_key') || '';
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        
        // Ask for API key if not set
        if (!API_KEY) {
            const key = prompt('Enter your Overlord API Key:');
            if (key) {
                localStorage.setItem('overlord_api_key', key);
                location.reload();
            }
        }
        
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }
        
        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message ai typing';
            div.id = 'typingIndicator';
            div.innerHTML = '<span></span><span></span><span></span>';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Add user message
            addMessage(message, 'user');
            messageInput.value = '';
            
            // Show typing
            showTyping();
            sendBtn.disabled = true;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': API_KEY
                    },
                    body: JSON.stringify({ message })
                });
                
                hideTyping();
                
                if (!response.ok) {
                    if (response.status === 401) {
                        addMessage('❌ Invalid API key. Reload to enter a new one.', 'error');
                        localStorage.removeItem('overlord_api_key');
                    } else {
                        addMessage(`❌ Error: ${response.status}`, 'error');
                    }
                    return;
                }
                
                const data = await response.json();
                addMessage(data.response, 'ai');
                
            } catch (error) {
                hideTyping();
                addMessage(`❌ Network error: ${error.message}`, 'error');
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }
        
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
