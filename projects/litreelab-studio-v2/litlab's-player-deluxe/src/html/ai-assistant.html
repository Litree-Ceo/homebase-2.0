<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Overlord Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .ai-chat-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ai-avatar {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-messages {
            background: #1a1a2e;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background: #16213e;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #0f3460;
        }

        .message.typing {
            display: flex;
            gap: 5px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
        }

        .chat-input-container {
            background: #16213e;
            padding: 20px;
            border-radius: 0 0 12px 12px;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #0f3460;
            border-radius: 25px;
            background: #1a1a2e;
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .chat-input::placeholder {
            color: #666;
        }

        .send-button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .quick-responses {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 15px 20px;
            background: #16213e;
            border-top: 1px solid #0f3460;
        }

        .quick-btn {
            padding: 8px 16px;
            background: #0f3460;
            border: 1px solid #667eea;
            border-radius: 20px;
            color: #a0a0a0;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: #667eea;
            color: white;
        }

        .chat-controls {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }

        .control-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #0f3460;
            border-radius: 8px;
            color: #a0a0a0;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn:hover {
            border-color: #667eea;
            color: white;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a0a0a0;
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="ai-chat-container">
        <div class="chat-header">
            <div class="ai-avatar">🤖</div>
            <div>
                <h2 style="margin: 0;">AI Assistant</h2>
                <span style="font-size: 13px; opacity: 0.9;">Mock AI - Ready to help</span>
            </div>
        </div>
        
        <div class="chat-controls">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>Online</span>
            </div>
            <button class="control-btn" onclick="clearChat()">🗑️ Clear Chat</button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                Hello! I'm your AI Assistant. How can I help you today? 😊
            </div>
        </div>

        <div class="quick-responses" id="quickResponses">
            <!-- Quick response buttons will be inserted here -->
        </div>

        <div class="chat-input-container">
            <input 
                type="text" 
                class="chat-input" 
                id="userInput" 
                placeholder="Type your message..."
                onkeypress="handleKeyPress(event)"
            >
            <button class="send-button" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="mock-ai-assistant.js"></script>
    <script>
        // Initialize the mock AI assistant
        const ai = new MockAIAssistant();
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const quickResponses = document.getElementById('quickResponses');

        // Quick response suggestions
        const quickSuggestions = [
            "What is the system status?",
            "Show me Docker containers",
            "Check disk usage",
            "List active services",
            "What can you help me with?"
        ];

        // Initialize quick response buttons
        function initQuickResponses() {
            quickResponses.innerHTML = quickSuggestions.map(text => 
                `<button class="quick-btn" onclick="sendQuickMessage('${text}')">${text}</button>`
            ).join('');
        }

        // Handle Enter key press
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Send a quick message from buttons
        function sendQuickMessage(text) {
            userInput.value = text;
            sendMessage();
        }

        // Send message function
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Disable input while processing
            userInput.disabled = true;
            sendBtn.disabled = true;

            // Add user message to chat
            addMessage(message, 'user');
            userInput.value = '';

            // Show typing indicator
            showTypingIndicator();

            try {
                // Process message through AI
                const response = await ai.processMessage(message);
                
                // Remove typing indicator and add response
                removeTypingIndicator();
                addMessage(response, 'assistant');
            } catch (error) {
                removeTypingIndicator();
                addMessage('Sorry, I encountered an error. Please try again.', 'assistant');
            }

            // Re-enable input
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        // Add message to chat
        function addMessage(text, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Show typing indicator
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant typing';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        // Clear chat
        function clearChat() {
            chatMessages.innerHTML = `
                <div class="message assistant">
                    Hello! I'm your AI Assistant. How can I help you today? 😊
                </div>
            `;
            ai.clearHistory();
        }

        // Initialize on load
        initQuickResponses();
    </script>
</body>
</html>
