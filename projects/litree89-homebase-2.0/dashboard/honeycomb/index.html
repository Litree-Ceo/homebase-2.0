<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Honeycomb Vision Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="starfield" id="starfield"></div>
    <div class="honeycomb-container">
      <div class="honeycomb-cell cosmic">Home</div>
      <div class="honeycomb-cell cosmic">Apps</div>
      <div class="honeycomb-cell cosmic">Assets</div>
      <div class="honeycomb-cell cosmic">Backup</div>
      <div class="honeycomb-cell cosmic">Dashboard</div>
      <div class="honeycomb-cell cosmic">Docs</div>
      <div class="honeycomb-cell cosmic">Labs-Ai</div>
      <div class="honeycomb-cell cosmic">Organized</div>
      <div class="honeycomb-cell cosmic">Packages</div>
      <div class="honeycomb-cell cosmic">Scripts</div>
      <div class="honeycomb-cell cosmic">Src</div>
      <div class="honeycomb-cell ai-widget command-center cosmic">
        <h3>🛰️ Command Center</h3>
        <p>Status: <span id="ai-status" class="ai-status-active">🟢 Online</span></p>
        <button id="ai-dock-btn">Dock AI Module</button>
        <button id="ai-launch-btn">Launch Copilot</button>
      </div>
      <div class="honeycomb-cell cosmic">More...</div>
    </div>
    <script>
      // Starfield cosmic background
      function createStarfield(numStars = 120) {
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < numStars; i++) {
          const star = document.createElement('div');
          star.className = 'star';
          const size = Math.random() * 2.5 + 1.5;
          star.style.width = `${size}px`;
          star.style.height = `${size}px`;
          star.style.top = `${Math.random() * 100}vh`;
          star.style.left = `${Math.random() * 100}vw`;
          star.style.opacity = Math.random() * 0.7 + 0.3;
          star.style.animation = `twinkle ${Math.random() * 2 + 1}s infinite alternate`;
          starfield.appendChild(star);
        }
      }
      createStarfield();

      // Animate status for visibility
      const status = document.getElementById('ai-status');
      let visible = true;
      setInterval(() => {
        status.style.opacity = visible ? '1' : '0.5';
        visible = !visible;
      }, 700);
      // Dock/Launch feedback
      document.getElementById('ai-dock-btn').onclick = function () {
        status.textContent = '🟢 AI Module Docked!';
        setTimeout(() => {
          status.textContent = '🟢 Online';
        }, 1500);
      };
      document.getElementById('ai-launch-btn').onclick = function () {
        status.textContent = '🚀 Copilot Launched!';
        setTimeout(() => {
          status.textContent = '🟢 Online';
        }, 1500);
      };
    </script>
  </body>
</html>
