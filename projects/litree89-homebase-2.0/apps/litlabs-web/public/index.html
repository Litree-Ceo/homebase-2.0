<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Litlabs Web</title>
    <style>
      body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #1e293b 0%, #6366f1 100%);
        color: #f1f5f9;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .container {
        background: rgba(30, 41, 59, 0.85);
        border-radius: 1.5rem;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        padding: 2.5rem 2rem 2rem 2rem;
        max-width: 420px;
        text-align: center;
      }
      h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
        color: #a5b4fc;
        letter-spacing: 1px;
      }
      p {
        font-size: 1.1rem;
        color: #e0e7ef;
        margin-bottom: 1.5rem;
      }
      .btn {
        background: #6366f1;
        color: #fff;
        border: none;
        border-radius: 0.5rem;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 1rem;
      }
      .btn:hover {
        background: #4f46e5;
      }
      .footer {
        margin-top: 2rem;
        font-size: 0.95rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Litlabs Web</h1>
      <p>
        AI-powered beauty business automation platform.<br />Seamless, modern, and ready for you.
      </p>
      <a href="#" class="btn">Get Started</a>
      <div class="footer">&copy; 2025 LiTree Labs. All rights reserved.</div>
    </div>
  </body>
</html>
