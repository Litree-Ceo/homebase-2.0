<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-Stack Azure App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
            margin-right: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .result pre {
            background: #333;
            color: #0f0;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Azure Full-Stack App</h1>
        <p>Your website with serverless backend API</p>
        
        <button class="btn" onclick="testAPI()">Test API</button>
        <button class="btn" onclick="getUserData()">Get User Data</button>
        
        <div id="result" class="result">
            <h3>API Response:</h3>
            <pre id="response"></pre>
        </div>
    </div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            const responseDiv = document.getElementById('response');
            
            try {
                const response = await fetch('/api/hello');
                const data = await response.json();
                responseDiv.textContent = JSON.stringify(data, null, 2);
                resultDiv.classList.add('show');
            } catch (error) {
                responseDiv.textContent = 'Error: ' + error.message;
                resultDiv.classList.add('show');
            }
        }

        async function getUserData() {
            const resultDiv = document.getElementById('result');
            const responseDiv = document.getElementById('response');
            
            try {
                const response = await fetch('/api/users');
                const data = await response.json();
                responseDiv.textContent = JSON.stringify(data, null, 2);
                resultDiv.classList.add('show');
            } catch (error) {
                responseDiv.textContent = 'Error: ' + error.message;
                resultDiv.classList.add('show');
            }
        }
    </script>
</body>
</html>
