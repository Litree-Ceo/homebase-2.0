services:
  overlord:
    build: .
    container_name: overlord-dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist config and logs
      - ./config.yaml:/app/config.yaml:ro
      - ./overlord.log:/app/overlord.log
    
    environment:
      - PYTHONUNBUFFERED=1
    
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
