<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlord AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Global Styles */
        :root {
            --background-color: #1a1b26;
            --foreground-color: #a9b1d6;
            --primary-color: #7aa2f7;
            --secondary-color: #f7768e;
            --accent-color: #bb9af7;
            --border-color: #414868;
            --input-bg-color: #24283b;
            --user-message-bg: #292e42;
            --assistant-message-bg: #2f354a;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--background-color);
            color: var(--foreground-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            background-color: #16161e;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-family: 'Roboto Mono', monospace;
            font-size: 1.5rem;
            color: var(--accent-color);
        }

        /* Main Chat Area */
        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.5rem;
        }

        #chatMessages {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            padding: 1rem;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.6;
        }

        .user {
            background-color: var(--user-message-bg);
            align-self: flex-end;
            border: 1px solid var(--primary-color);
        }

        .assistant {
            background-color: var(--assistant-message-bg);
            align-self: flex-start;
            border: 1px solid var(--border-color);
        }

        /* Typing Indicator */
        .typing {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            animation: typing-blink 1.4s infinite both;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing-blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        /* Quick Responses */
        .quick-responses-container {
            padding: 0 1.5rem;
            margin-bottom: 1rem;
        }

        #quickResponses {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .quick-btn {
            background-color: var(--input-bg-color);
            color: var(--foreground-color);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .quick-btn:hover {
            background-color: var(--primary-color);
            color: var(--background-color);
            border-color: var(--primary-color);
        }

        /* Input Area */
        .input-container {
            display: flex;
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
            background-color: #16161e;
        }

        #userInput {
            flex-grow: 1;
            background-color: var(--input-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 0.75rem;
            color: var(--foreground-color);
            font-size: 1rem;
        }

        #userInput:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        #sendBtn {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 0.75rem 1.5rem;
            margin-left: 1rem;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }

        #sendBtn:hover {
            background-color: #5d87ee;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>Overlord AI</h1>
    </div>

    <div class="chat-container">
        <div id="chatMessages">
            <div class="message assistant">Hello! I am the Overlord AI. How can I assist you?</div>
        </div>
    </div>

    <div class="quick-responses-container">
        <div id="quickResponses"></div>
    </div>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="Ask me anything..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        // AI Assistant Integration
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const quickResponses = document.getElementById('quickResponses');
        const apiKey = new URLSearchParams(window.location.search).get('api_key');

        // Quick response suggestions
        const quickSuggestions = [
            "What is the current system CPU load?",
            "Summarize the disk usage.",
            "Are there any active GPU processes?",
            "What can you do?"
        ];

        function initQuickResponses() {
            quickResponses.innerHTML = quickSuggestions.map(text => 
                `<button class="quick-btn" onclick="sendQuickMessage('${text}')">${text}</button>`
            ).join('');
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendQuickMessage(text) {
            userInput.value = text;
            sendMessage();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            if (!apiKey) {
                addMessage('Authentication error: API key is missing from the URL. Please access this page through the main dashboard.', 'assistant');
                return;
            }

            userInput.disabled = true;
            sendBtn.disabled = true;
            addMessage(message, 'user');
            userInput.value = '';
            showTypingIndicator();

            try {
                const response = await fetch('/api/ai/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': apiKey
                    },
                    body: JSON.stringify({ prompt: message })
                });

                removeTypingIndicator();

                if (!response.ok) {
                    const errorData = await response.json();
                    const errorMsg = `Error: ${response.status} ${response.statusText}. ${errorData.details || errorData.error}`;
                    addMessage(errorMsg, 'assistant');
                } else {
                    const data = await response.json();
                    addMessage(data.response, 'assistant');
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('Sorry, I encountered a network error. Please check the server console and try again.', 'assistant');
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        function addMessage(text, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            // Basic sanitation to prevent HTML injection
            const textNode = document.createTextNode(text);
            messageDiv.appendChild(textNode);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant typing';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        function clearChat() {
            chatMessages.innerHTML = `<div class="message assistant">Hello! I am the Overlord AI. How can I assist you?</div>`;
        }

        // Initialize
        initQuickResponses();
        if (!apiKey) {
            addMessage('Authentication error: API key is missing. Please ensure you are accessing this page correctly.', 'assistant');
        }
    </script>

</body>
</html>
