worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Define an upstream for the backend Python server for clarity and flexibility
    upstream overlord_backend {
        server 127.0.0.1:8080;
    }

    # Server block to permanently redirect all HTTP traffic to HTTPS
    server {
        listen       80;
        server_name  localhost;
        return 301 https://$host$request_uri;
    }

    # Main server block for handling HTTPS traffic
    server {
        listen       443 ssl http2;
        server_name  localhost;

        # --- SSL Certificate Configuration ---\n        # These paths will be updated by the setup-ssl.ps1 script.\n        ssl_certificate      "C:/Users/litre/Desktop/Overlord-Pc-Dashboard/tools/nginx/ssl/overlord.crt";\n        ssl_certificate_key  "C:/Users/litre/Desktop/Overlord-Pc-Dashboard/tools/nginx/ssl/overlord.key";

        # --- Security Hardening ---\
        # Use modern, secure TLS protocols and ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers off;

        # Add HSTS (HTTP Strict Transport Security) header to force browsers to use HTTPS
        # This tells the browser to remember to only use HTTPS for the next 6 months.
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
        
        # OWASP Recommended Headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;


        # --- Reverse Proxy Configuration ---\
        # Main application reverse proxy
        location / {
            proxy_pass http://overlord_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Social Hub - Static content
        location /social/ {
            alias "c:/Users/litre/Desktop/Overlord-Monolith/modules/social/";
            index index.html;
            try_files $uri $uri/ /social/index.html;
        }

        # Grid - Static content
        location /grid/ {
            alias "c:/Users/litre/Desktop/Overlord-Monolith/modules/grid/";
            index index.html;
        }
    }
}