<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0914"/>
      <stop offset="50%" stop-color="#07060f"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#52f2ff"/>
      <stop offset="50%" stop-color="#2dd4e6"/>
      <stop offset="100%" stop-color="#52f2ff"/>
    </linearGradient>
    
    <linearGradient id="magentaGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4ddb"/>
      <stop offset="100%" stop-color="#e63eb8"/>
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="cyanBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="magentaBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="arithmetic" k2="-1" k3="1"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  
  <!-- Hexagonal Grid Pattern (subtle) -->
  <g opacity="0.08" stroke="#52f2ff" stroke-width="1" fill="none">
    <path d="M128 128 L170.6 103.5 L213.2 128 L213.2 177 L170.6 201.5 L128 177 Z"/>
    <path d="M213.2 128 L255.8 103.5 L298.4 128 L298.4 177 L255.8 201.5 L213.2 177 Z"/>
    <path d="M298.4 128 L341 103.5 L383.6 128 L383.6 177 L341 201.5 L298.4 177 Z"/>
    <path d="M170.6 201.5 L213.2 177 L255.8 201.5 L255.8 250.5 L213.2 275 L170.6 250.5 Z"/>
    <path d="M255.8 201.5 L298.4 177 L341 201.5 L341 250.5 L298.4 275 L255.8 250.5 Z"/>
    <path d="M128 275 L170.6 250.5 L213.2 275 L213.2 324 L170.6 348.5 L128 324 Z"/>
    <path d="M213.2 275 L255.8 250.5 L298.4 275 L298.4 324 L255.8 348.5 L213.2 324 Z"/>
    <path d="M298.4 275 L341 250.5 L383.6 275 L383.6 324 L341 348.5 L298.4 324 Z"/>
    <path d="M170.6 348.5 L213.2 324 L255.8 348.5 L255.8 397.5 L213.2 422 L170.6 397.5 Z"/>
    <path d="M255.8 348.5 L298.4 324 L341 348.5 L341 397.5 L298.4 422 L255.8 397.5 Z"/>
  </g>
  
  <!-- Outer Glow Ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#ff4ddb" stroke-width="2" opacity="0.3" filter="url(#magentaBlur)"/>
  
  <!-- Circuit Traces -->
  <g stroke="#52f2ff" stroke-width="2" fill="none" opacity="0.4" filter="url(#cyanBlur)">
    <path d="M100 256 L140 256"/>
    <path d="M372 256 L412 256"/>
    <path d="M256 100 L256 140"/>
    <path d="M256 372 L256 412"/>
    <circle cx="140" cy="256" r="4" fill="#52f2ff"/>
    <circle cx="372" cy="256" r="4" fill="#52f2ff"/>
    <circle cx="256" cy="140" r="4" fill="#52f2ff"/>
    <circle cx="256" cy="372" r="4" fill="#52f2ff"/>
  </g>
  
  <!-- Waveform Lines -->
  <g stroke="#52f2ff" stroke-width="2" fill="none" opacity="0.3">
    <path d="M180 200 Q200 180, 220 200 T260 200 T300 200" filter="url(#cyanBlur)"/>
    <path d="M180 312 Q200 332, 220 312 T260 312 T300 312" filter="url(#cyanBlur)"/>
  </g>
  
  <!-- Main Diamond Symbol (◈) -->
  <g transform="translate(256, 256)">
    <!-- Outer Diamond Glow -->
    <path d="M0 -100 L86.6 -50 L86.6 50 L0 100 L-86.6 50 L-86.6 -50 Z" 
          fill="none" stroke="#ff4ddb" stroke-width="4" opacity="0.6" filter="url(#magentaBlur)"/>
    
    <!-- Middle Diamond -->
    <path d="M0 -85 L73.6 -42.5 L73.6 42.5 L0 85 L-73.6 42.5 L-73.6 -42.5 Z" 
          fill="rgba(82, 242, 255, 0.1)" stroke="url(#cyanGlow)" stroke-width="3" filter="url(#cyanBlur)"/>
    
    <!-- Inner Diamond -->
    <path d="M0 -60 L52 -30 L52 30 L0 60 L-52 30 L-52 -30 Z" 
          fill="rgba(255, 77, 219, 0.15)" stroke="#ff4ddb" stroke-width="2"/>
    
    <!-- Center Vertical Line -->
    <rect x="-4" y="-50" width="8" height="100" rx="2" fill="url(#cyanGlow)" filter="url(#cyanBlur)"/>
    
    <!-- Center Dot -->
    <circle cx="0" cy="0" r="12" fill="#52f2ff" filter="url(#cyanBlur)"/>
    <circle cx="0" cy="0" r="6" fill="#ffffff"/>
  </g>
  
  <!-- Corner Accents -->
  <g stroke="#52f2ff" stroke-width="2" fill="none" opacity="0.5">
    <path d="M48 80 L48 48 L80 48"/>
    <path d="M432 48 L464 48 L464 80"/>
    <path d="M48 432 L48 464 L80 464"/>
    <path d="M464 432 L464 464 L432 464"/>
  </g>
  
  <!-- Status Dots -->
  <circle cx="420" cy="420" r="6" fill="#50f0a6" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>