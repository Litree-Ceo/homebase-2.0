# SonarQube configuration for Node.js API
sonar.projectKey=homebase-api
sonar.projectName=HomeBase API
sonar.sources=.
sonar.exclusions=node_modules/**,dist/**,coverage/**

# Configure JavaScript/Node.js analysis
sonar.javascript.environments=node
sonar.javascript.globals=require,module,exports,process,__dirname,__filename,Buffer,console
