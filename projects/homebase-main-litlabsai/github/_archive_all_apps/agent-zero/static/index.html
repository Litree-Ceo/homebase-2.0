<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Zero - Web Interface</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: #10b981; }
        .status-dot {
            width: 8px; height: 8px; background: #10b981; border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .container {
            flex: 1; max-width: 900px; width: 100%; margin: 0 auto;
            padding: 2rem; display: flex; flex-direction: column;
        }
        .chat-container {
            flex: 1; background: rgba(0,0,0,0.2); border-radius: 12px;
            overflow: hidden; display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 1.5rem; max-height: 60vh;
        }
        .message { margin-bottom: 1rem; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { text-align: right; }
        .message-content {
            display: inline-block; padding: 0.75rem 1rem; border-radius: 12px;
            max-width: 80%; word-wrap: break-word;
        }
        .message.user .message-content { background: #3b82f6; }
        .message.agent .message-content { background: rgba(255,255,255,0.1); text-align: left; }
        .message-meta { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 0.25rem; }
        .input-area {
            padding: 1rem 1.5rem; background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .input-wrapper { display: flex; gap: 0.75rem; }
        input[type="text"] {
            flex: 1; padding: 0.75rem 1rem; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; font-size: 1rem;
        }
        input[type="text"]:focus { outline: none; border-color: #3b82f6; }
        button {
            padding: 0.75rem 1.5rem; background: #3b82f6; color: #fff;
            border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;
            transition: background 0.2s;
        }
        button:hover { background: #2563eb; }
        button:disabled { background: #6b7280; cursor: not-allowed; }
        .info-panel {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem; margin-bottom: 1.5rem;
        }
        .info-card {
            background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .info-card h3 { font-size: 0.875rem; color: rgba(255,255,255,0.6); margin-bottom: 0.5rem; }
        .info-card p { font-size: 1.25rem; font-weight: 600; }
        .typing { display: flex; gap: 4px; padding: 0.5rem; }
        .typing-dot { width: 8px; height: 8px; background: rgba(255,255,255,0.5); border-radius: 50%; animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
        .error { color: #ef4444; padding: 0.5rem; background: rgba(239, 68, 68, 0.1); border-radius: 4px; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Agent Zero</h1>
        <div class="status">
            <span class="status-dot"></span>
            <span id="connection-status">Connecting...</span>
        </div>
    </div>

    <div class="container">
        <div class="info-panel">
            <div class="info-card">
                <h3>Uptime</h3>
                <p id="uptime">--</p>
            </div>
            <div class="info-card">
                <h3>Messages</h3>
                <p id="message-count">0</p>
            </div>
            <div class="info-card">
                <h3>Status</h3>
                <p id="agent-state">--</p>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chat-messages">
                <div class="message agent">
                    <div class="message-content">Hello! I'm Agent Zero. How can I help you today?</div>
                    <div class="message-meta">Agent Zero • Just now</div>
                </div>
            </div>

            <div class="input-area">
                <div id="error-message"></div>
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="Type your message..." autocomplete="off">
                    <button id="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin.includes('localhost') ? 'http://localhost:8000' : window.location.origin;
        let messageCount = 0;

        document.addEventListener('DOMContentLoaded', () => {
            checkStatus();
            setInterval(checkStatus, 5000);
            document.getElementById('message-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        });

        async function checkStatus() {
            try {
                const response = await fetch(`${API_URL}/status`);
                const data = await response.json();
                document.getElementById('connection-status').textContent = 'Connected';
                document.getElementById('uptime').textContent = data.uptime;
                document.getElementById('message-count').textContent = data.messages_processed;
                document.getElementById('agent-state').textContent = data.state;
                messageCount = data.messages_processed;
            } catch (error) {
                document.getElementById('connection-status').textContent = 'Disconnected';
                console.error('Status check failed:', error);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';
            showTyping();

            try {
                const response = await fetch(`${API_URL}/command`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: message })
                });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                hideTyping();
                addMessage(data.response, 'agent');
                document.getElementById('agent-state').textContent = data.status;
                messageCount += 2;
                document.getElementById('message-count').textContent = messageCount;
            } catch (error) {
                hideTyping();
                showError('Failed to send message. Please check your connection.');
            }
        }

        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('chat-messages');
            const time = new Date().toLocaleTimeString();
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.innerHTML = `
                <div class="message-content">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
                <div class="message-meta">${sender === 'user' ? 'You' : 'Agent Zero'} • ${time}</div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping() {
            const messagesDiv = document.getElementById('chat-messages');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'message agent';
            typingDiv.innerHTML = `
                <div class="message-content">
                    <div class="typing">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            document.getElementById('send-btn').disabled = true;
        }

        function hideTyping() {
            const typingDiv = document.getElementById('typing-indicator');
            if (typingDiv) typingDiv.remove();
            document.getElementById('send-btn').disabled = false;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.innerHTML = `<div class="error">${message}</div>`;
            setTimeout(() => errorDiv.innerHTML = '', 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
